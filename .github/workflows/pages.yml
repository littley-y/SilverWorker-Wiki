      <a class="nav-link" data-md="PR_Review/2026-04-25-role_dev-pr1-request.md">PR #1 Request</a>
      <a class="nav-link" data-md="PR_Review/2026-04-25-role_dev-pr1-review_claude.md">PR #1 Claude v1</a>
