      <a class="nav-link" data-md="PR_Review/2026-04-25-role_dev-postmerge-firebase-setup.md">Firebase Setup Post-Merge</a>
      <a class="nav-link" data-md="PR_Review/2026-04-25-role_dev-firebase-setup-review_gemini.md">Firebase Setup Gemini</a>
      <a class="nav-link" data-md="PR_Review/2026-04-25-role_dev-postmerge-firebase-setup-review_claude.md">Firebase Setup Claude</a>
    </div>
  </div>
</div>
<div id="main"><div id="content"><div id="loading">Loading...</div></div></div>
<script>
const contentDiv = document.getElementById('content');

// Custom renderer: intercept .md links to use our nav system
const renderer = new marked.Renderer();
renderer.link = (href, title, text) => {
  if (href.endsWith('.md')) {
    return `<a href="#" class="md-link" data-md="${href}">${text}</a>`;
  }
  return `<a href="${href}" target="_blank" rel="noopener">${text}</a>`;
};
marked.setOptions({ renderer });

let currentPath = '';

async function loadMarkdown(path) {
  try {
    if (currentPath && !path.startsWith('/') && !path.includes('://')) {
      const baseDir = currentPath.substring(0, currentPath.lastIndexOf('/') + 1);
      path = baseDir + path;
    }
    currentPath = path;

    const response = await fetch(path);
    if (!response.ok) throw new Error('Failed to load ' + path);
    const text = await response.text();
    contentDiv.innerHTML = marked.parse(text);
    document.querySelectorAll('.md-link').forEach(link => {
      link.addEventListener('click', (e) => {
        e.preventDefault();
        loadMarkdown(link.dataset.md);
      });
    });
    window.scrollTo(0, 0);
  } catch (e) {
    contentDiv.innerHTML = '<p style="color:#ef4444">Error: ' + e.message + '</p>';
  }
}

document.querySelectorAll('.nav-link[data-md]').forEach(link => {
  link.addEventListener('click', (e) => {
    e.preventDefault();
    document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
    link.classList.add('active');
    loadMarkdown(link.dataset.md);
  });
});

const firstLink = document.querySelector('.nav-link[data-md]');
if (firstLink) {
  firstLink.classList.add('active');
  loadMarkdown(firstLink.dataset.md);
}
</script>
</body>
</html>
HTMLEOF

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
