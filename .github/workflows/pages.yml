name: Deploy Wiki to GitHub Pages

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build wiki site
        run: |
          mkdir -p _site

          # Copy all markdown files preserving structure
          cp -r planning _site/
          cp -r history _site/
          cp -r PR_Review _site/
          cp PROGRESS.md _site/
          cp AGENTS.md _site/
          cp REVIEWER_PROMPT.md _site/
          cp IMPLEMENTER_PROMPT.md _site/

          cp wiki.html _site/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
